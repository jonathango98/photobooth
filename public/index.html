<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Photobooth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/manifest.json" />
</head>
<body>

  <!-- White flash on capture -->
  <div id="flash-overlay"></div>

  <!-- CAMERA / IDLE SCREEN -->
  <div id="idle-screen" class="screen active">
    <div class="camera-wrap">
      <canvas id="camera-canvas"></canvas>
      <div class="camera-overlay">
        <div id="shot-counter" class="shot-counter"></div>
        <div id="countdown-overlay" class="countdown-overlay"></div>
        <div id="press-hint" class="press-hint hidden">PRESS TO START</div>
      </div>
    </div>
    <!-- Shown before camera permission granted -->
    <h1 id="idle-text">PRESS TO START</h1>

    <!-- Peace sign progress ring -->
    <svg id="peace-progress" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r="54" stroke-width="6" fill="none"
              stroke="rgba(255,255,255,0.2)" />
      <circle id="peace-ring" cx="60" cy="60" r="54" stroke-width="6" fill="none"
              stroke="gold" stroke-linecap="round"
              stroke-dasharray="339.292" stroke-dashoffset="339.292" />
      <text id="gesture-emoji" x="60" y="68" text-anchor="middle" font-size="32" fill="white">✌️</text>
    </svg>

    <video id="video" autoplay playsinline style="display:none;"></video>

    <!-- Reset session button (visible once shots are in progress) -->
    <button id="reset-btn" class="reset-session-btn hidden">↩ Reset</button>

    <!-- Info button to reopen instructions -->
    <button id="info-btn" class="info-btn">i</button>

    <!-- Instruction popup -->
    <div id="instruction-overlay" class="instruction-overlay">
      <div class="instruction-card">
        <h2>How It Works</h2>
        <ol id="instruction-rules"></ol>
        <p class="instruction-disclaimer" id="instruction-disclaimer"></p>
        <button id="instruction-close-btn" class="instruction-close-btn">Got It</button>
      </div>
    </div>
  </div>

  <!-- TEMPLATE SELECTION SCREEN -->
  <div id="template-screen" class="screen">
    <div class="template-layout">
      <h2>CHOOSE A TEMPLATE<span>select your style</span></h2>
      <div id="template-grid" class="template-grid"></div>
      <div class="template-actions">
        <button id="template-reset-btn" class="reset-session-btn">↩ Start Over</button>
        <button id="confirm-btn">Confirm Selection</button>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="screen">
    <div class="result-layout">
      <div class="result-photo-wrap">
        <canvas id="photo-canvas"></canvas>
      </div>
      <div class="result-qr-wrap">
        <div class="qr-card">
          <p id="scan-to-download-text">Scan to Download</p>
          <img id="qr-img" alt="QR Code" />
          <p id="upload-status" style="font-size:12px;opacity:0.6;margin:4px 0 0;text-align:center;"></p>
        </div>
        <div class="result-actions">
          <button id="back-btn">Start Over</button>
          <div class="reset-countdown">
            <span id="reset-label">Restarting in <span id="reset-seconds"></span>s</span>
            <div class="reset-bar-wrap">
              <div id="reset-bar"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="vendor/qrcode.min.js"></script>
  <script src="offline-queue.js"></script>
  <script src="main.js"></script>
</body>
</html>
