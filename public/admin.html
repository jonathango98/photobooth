<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Photobooth</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; }
        .login-box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: 50px auto; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 10px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .admin-controls { display: none; }
        .session { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .session h3 { margin-top: 0; }
        .photo-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .photo-item { position: relative; }
        .photo-item img { width: 150px; height: auto; border-radius: 4px; cursor: pointer; }
        .photo-item .label { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.5); color: #fff; font-size: 10px; padding: 2px 4px; border-radius: 2px; }
        .btn { padding: 8px 16px; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; margin-right: 10px; }
        .btn-download-all { background: #17a2b8; margin-bottom: 20px; }
        #logout-btn { background: #dc3545; float: right; margin-top: -50px; }

        /* Tabs Styling */
        .tabs { border-bottom: 2px solid #ccc; margin-bottom: 20px; display: flex; gap: 5px; }
        .tab-btn { padding: 10px 20px; border: none; background: #ddd; border-top-left-radius: 4px; border-top-right-radius: 4px; cursor: pointer; transition: 0.3s; }
        .tab-btn:hover { background: #ccc; }
        .tab-btn.active { background: #fff; border: 2px solid #ccc; border-bottom: none; margin-bottom: -2px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Panel</h1>
        
        <div id="login-form" class="login-box">
            <h2>Enter Password</h2>
            <input type="password" id="admin-password" placeholder="Password">
            <button id="login-btn">Login</button>
        </div>

        <div id="admin-content" class="admin-controls">
            <button id="logout-btn" class="btn">Logout</button>
            <button id="download-zip-btn" class="btn btn-download-all">Download All as ZIP</button>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="collages">Collages</button>
                <button class="tab-btn" data-tab="raws">Raw Images</button>
            </div>

            <div id="sessions-list"></div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
