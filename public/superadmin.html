<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Photobooth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'IBM Plex Mono', monospace; background: #000; color: #f7f2d5; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }

        /* Login */
        .login-box { background: #111; padding: 24px; border-radius: 8px; border: 1px solid rgba(247,242,213,0.12); max-width: 400px; margin: 80px auto; }
        .login-box h2 { margin-top: 0; letter-spacing: 0.05em; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid rgba(247,242,213,0.2); border-radius: 4px; box-sizing: border-box; background: #1a1a1a; color: #f7f2d5; font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
        .login-box input::placeholder { color: rgba(247,242,213,0.35); }
        .login-box button { width: 100%; padding: 10px; background: #f7f2d5; color: #000; border: none; border-radius: 4px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.05em; }
        .login-box button:hover { background: #ede8c4; }

        /* Top Bar */
        #top-bar { background: #0d0d0d; border-bottom: 1px solid rgba(247,242,213,0.1); padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
        #top-bar h1 { margin: 0; font-size: 16px; letter-spacing: 0.1em; color: #f7f2d5; }
        #breadcrumb { flex: 1; font-size: 12px; color: rgba(247,242,213,0.5); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #breadcrumb span { cursor: pointer; color: rgba(247,242,213,0.7); }
        #breadcrumb span:hover { color: #f7f2d5; text-decoration: underline; }
        #logout-btn { background: transparent; color: rgba(247,242,213,0.7); border: 1px solid rgba(247,242,213,0.2); border-radius: 4px; padding: 6px 14px; cursor: pointer; font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
        #logout-btn:hover { color: #f7f2d5; border-color: rgba(247,242,213,0.5); }

        /* Main Layout */
        #main-layout { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 280px; background: #0a0a0a; border-right: 1px solid rgba(247,242,213,0.08); overflow-y: auto; flex-shrink: 0; padding: 10px 0; }
        #sidebar-header { padding: 8px 16px; font-size: 11px; text-transform: uppercase; color: rgba(247,242,213,0.4); letter-spacing: 0.12em; }
        #tree-container { padding: 0; }
        .tree-node { user-select: none; }
        .tree-node-label { display: flex; align-items: center; gap: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; border-radius: 4px; margin: 1px 6px; color: rgba(247,242,213,0.8); }
        .tree-node-label:hover { background: rgba(247,242,213,0.06); }
        .tree-node-label.selected { background: rgba(247,242,213,0.12); color: #f7f2d5; }
        .tree-node-label .toggle { width: 16px; text-align: center; font-size: 10px; color: rgba(247,242,213,0.35); flex-shrink: 0; }
        .tree-node-label .folder-icon { font-size: 14px; }
        .tree-node-label .folder-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tree-node-label .file-count { font-size: 11px; color: rgba(247,242,213,0.35); flex-shrink: 0; }
        .tree-node-label .delete-folder-btn { font-size: 12px; opacity: 0; cursor: pointer; color: rgba(247,242,213,0.5); padding: 0 4px; border-radius: 2px; flex-shrink: 0; }
        .tree-node-label:hover .delete-folder-btn { opacity: 1; }
        .tree-node-label .delete-folder-btn:hover { color: #f7f2d5; background: rgba(247,242,213,0.1); }
        .tree-node-children { padding-left: 16px; }

        /* Right panel */
        #right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #000; }
        #panel-controls { padding: 12px 16px; background: #0d0d0d; border-bottom: 1px solid rgba(247,242,213,0.08); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        #panel-controls .btn { padding: 6px 12px; border: 1px solid rgba(247,242,213,0.2); border-radius: 4px; cursor: pointer; font-size: 12px; font-family: 'IBM Plex Mono', monospace; background: transparent; color: rgba(247,242,213,0.8); transition: background 0.15s, color 0.15s; }
        #panel-controls .btn:hover { background: rgba(247,242,213,0.08); color: #f7f2d5; }
        #delete-selected-btn { border-color: rgba(247,242,213,0.3); }
        #delete-selected-btn:not(:disabled):hover { background: rgba(247,242,213,0.1); }
        #delete-selected-btn:disabled { opacity: 0.3; cursor: default; }
        #download-selected-btn:disabled { opacity: 0.3; cursor: default; }
        #select-all-btn, #clear-selection-btn { color: rgba(247,242,213,0.6); }
        .photo-count { font-size: 12px; color: rgba(247,242,213,0.4); margin-left: auto; }

        /* Photo Grid */
        #photo-grid-container { flex: 1; overflow-y: auto; padding: 16px; }
        #photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .photo-item { position: relative; background: #1a1a1a; border-radius: 8px; overflow: hidden; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.4); cursor: pointer; border: 2px solid transparent; transition: transform 0.15s, border 0.15s; }
        .photo-item:hover { transform: scale(1.03); }
        .photo-item.selected { border-color: #f7f2d5; }
        .photo-item .checkbox-overlay { position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; background: rgba(0,0,0,0.7); border: 2px solid rgba(247,242,213,0.6); border-radius: 4px; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .photo-item.selected .checkbox-overlay { border-color: #f7f2d5; background: rgba(247,242,213,0.15); }
        .photo-item.selected .checkbox-overlay::after { content: "✓"; color: #f7f2d5; font-weight: bold; font-size: 13px; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .photo-item .label { position: absolute; bottom: 4px; left: 4px; right: 4px; background: rgba(0,0,0,0.7); color: #f7f2d5; font-size: 10px; padding: 2px 4px; border-radius: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-icon-item { flex-direction: column; gap: 6px; background: #111; }
        .file-icon-item .file-icon-big { font-size: 36px; }
        .file-icon-item .file-icon-name { font-size: 10px; color: rgba(247,242,213,0.5); text-align: center; padding: 0 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }

        #empty-msg { color: rgba(247,242,213,0.35); font-size: 13px; padding: 60px 40px; text-align: center; letter-spacing: 0.05em; }

        /* Modal */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        #modal-overlay.active { display: flex; }
        #modal-box { background: #111; border: 1px solid rgba(247,242,213,0.15); border-radius: 8px; padding: 24px; max-width: 420px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
        #modal-box h3 { margin-top: 0; color: #f7f2d5; }
        #modal-box p { color: rgba(247,242,213,0.6); }
        #modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        #modal-cancel { padding: 8px 18px; background: transparent; color: rgba(247,242,213,0.7); border: 1px solid rgba(247,242,213,0.2); border-radius: 4px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
        #modal-cancel:hover { background: rgba(247,242,213,0.06); }
        #modal-confirm { padding: 8px 18px; background: #f7f2d5; color: #000; border: none; border-radius: 4px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
        #modal-confirm:hover { background: #ede8c4; }

        /* Hidden */
        .hidden { display: none !important; }

        /* Download / Move buttons */
        #download-selected-btn { }
        #download-all-btn { }

        /* Per-file action buttons */
        .item-actions { position: absolute; bottom: 24px; right: 4px; display: flex; gap: 3px; opacity: 0; transition: opacity 0.15s; z-index: 10; }
        .photo-item:hover .item-actions { opacity: 1; }
        .item-action-btn { background: rgba(0,0,0,0.8); color: #f7f2d5; border: 1px solid rgba(247,242,213,0.2); border-radius: 3px; padding: 2px 6px; cursor: pointer; font-size: 11px; line-height: 1.6; font-family: 'IBM Plex Mono', monospace; }
        .item-action-btn:hover { background: rgba(247,242,213,0.15); }

        /* Move Modal */
        #move-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        #move-modal-overlay.active { display: flex; }
        #move-modal-box { background: #111; border: 1px solid rgba(247,242,213,0.15); border-radius: 8px; padding: 24px; max-width: 480px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
        #move-modal-box h3 { margin-top: 0; color: #f7f2d5; }
        #move-dest-input { width: 100%; padding: 8px; border: 1px solid rgba(247,242,213,0.2); border-radius: 4px; box-sizing: border-box; font-size: 13px; font-family: 'IBM Plex Mono', monospace; background: #1a1a1a; color: #f7f2d5; }
        #move-dest-input::placeholder { color: rgba(247,242,213,0.3); }
        #move-modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
        #move-modal-cancel { padding: 8px 18px; background: transparent; color: rgba(247,242,213,0.7); border: 1px solid rgba(247,242,213,0.2); border-radius: 4px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
        #move-modal-cancel:hover { background: rgba(247,242,213,0.06); }
        #move-modal-confirm { padding: 8px 18px; background: #f7f2d5; color: #000; border: none; border-radius: 4px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
        #move-modal-confirm:hover { background: #ede8c4; }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="login-section">
        <div class="login-box">
            <h2>Super Admin Login</h2>
            <input type="password" id="superadmin-password" placeholder="Password">
            <button id="login-btn">Login</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-section" class="hidden">
        <div id="top-bar">
            <h1>Super Admin</h1>
            <div id="breadcrumb"><span data-prefix="">root</span></div>
            <button id="logout-btn">Logout</button>
        </div>

        <div id="main-layout">
            <div id="sidebar">
                <div id="sidebar-header">Folders</div>
                <div id="tree-container"><p style="padding: 12px 16px; color: #888; font-size: 13px;">Loading...</p></div>
            </div>

            <div id="right-panel">
                <div id="panel-controls">
                    <button class="btn" id="delete-selected-btn" disabled>Delete Selected (0)</button>
                    <button class="btn" id="download-selected-btn" disabled>Download Selected (0)</button>
                    <button class="btn" id="download-all-btn">Download All</button>
                    <button class="btn" id="select-all-btn">Select All</button>
                    <button class="btn" id="clear-selection-btn">Clear</button>
                    <span class="photo-count" id="photo-count"></span>
                </div>
                <div id="photo-grid-container">
                    <div id="empty-msg">Select a folder to view its contents.</div>
                    <div id="photo-grid" class="hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="modal-overlay">
        <div id="modal-box">
            <h3 id="modal-title">Confirm Delete</h3>
            <p id="modal-message"></p>
            <div id="modal-actions">
                <button id="modal-cancel">Cancel</button>
                <button id="modal-confirm">Delete</button>
            </div>
        </div>
    </div>

    <!-- Move / Rename Modal -->
    <div id="move-modal-overlay">
        <div id="move-modal-box">
            <h3>Move / Rename File</h3>
            <p style="color:#555;font-size:13px;margin-bottom:8px;">Enter the new S3 path for the file:</p>
            <input type="text" id="move-dest-input" placeholder="eventId/folder/filename.jpg">
            <div id="move-modal-actions">
                <button id="move-modal-cancel">Cancel</button>
                <button id="move-modal-confirm">Move</button>
            </div>
        </div>
    </div>

    <script src="superadmin.js"></script>
</body>
</html>
